name: Build macOS Package

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-release.yml"
      - "mac/macos_source_bundle.tar.gz.b64"
      - "mac/macos_source_bundle.tar.gz.b64.part.*"
      - "Package.swift"
      - "Sources/ChromeMultiManagerMac/**"
      - "script/package_macos_release.sh"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip macos package]') }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Expand source bundle
        run: |
          if ls mac/macos_source_bundle.tar.gz.b64.part.* >/dev/null 2>&1; then
            cat mac/macos_source_bundle.tar.gz.b64.part.* > /tmp/chrome-multi-manager-mac-source.tar.gz.b64
            base64 --decode < /tmp/chrome-multi-manager-mac-source.tar.gz.b64 > /tmp/chrome-multi-manager-mac-source.tar.gz
            tar -xzf /tmp/chrome-multi-manager-mac-source.tar.gz
            rm -f mac/macos_source_bundle.tar.gz.b64.part.*
          elif [[ -f "mac/macos_source_bundle.tar.gz.b64" ]]; then
            base64 --decode < "mac/macos_source_bundle.tar.gz.b64" > /tmp/chrome-multi-manager-mac-source.tar.gz
            tar -xzf /tmp/chrome-multi-manager-mac-source.tar.gz
            rm -f "mac/macos_source_bundle.tar.gz.b64"
          fi

      - name: Configure Developer ID signing
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ]]; then
            echo "No Developer ID certificate secret was provided; building an ad-hoc test package."
            echo "SIGN_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi

          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          KEYCHAIN_PATH="$RUNNER_TEMP/chrome-multi-manager-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application identity was found in the imported certificate."
            security find-identity -p codesigning -v "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "SIGN_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "chrome-multi-manager-notary" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
            echo "NOTARY_PROFILE=chrome-multi-manager-notary" >> "$GITHUB_ENV"
          else
            echo "Notarization secrets are incomplete; the package will be Developer ID signed but not notarized."
          fi

      - name: Build package
        run: ./script/package_macos_release.sh

      - name: Verify package
        run: |
          test -f "Chrome多开管理器_mac_发布版.zip"
          mkdir -p /tmp/chrome-multi-manager-mac
          ditto -x -k "Chrome多开管理器_mac_发布版.zip" /tmp/chrome-multi-manager-mac
          codesign --verify --deep --strict --verbose=2 "/tmp/chrome-multi-manager-mac/Chrome 多开管理器.app"

      - name: Commit package
        run: |
          if [[ -z "$(git status --porcelain -- "Chrome多开管理器_mac_发布版.zip")" ]]; then
            echo "No package changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github .gitignore Package.swift README.md Sources mac script "Chrome多开管理器_mac_发布版.zip"
          git commit -m "Add native macOS app package [skip macos package]"
          git pull --rebase origin main
          git push
